server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # En-tetes de securite (trouves manquants par l'audit OWASP ZAP)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://via.placeholder.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.up.railway.app https://*.ingest.de.sentry.io; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # Toutes les routes inconnues → index.html (laisse React gérer la route)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les fichiers statiques (perf)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}