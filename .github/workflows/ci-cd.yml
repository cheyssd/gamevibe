name: CI/CD Gamevibe

on: 
    push:
        branches: [main]

    pull_request:
        branches: [main]

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, bcmath, gd, pcntl, exif
          coverage: pcov

      - name: Installer les dépendances Composer
        working-directory: backend
        run: composer install --optimize-autoloader --no-interaction

      - name: Copier le fichier .env de test
        working-directory: backend
        run: |
          cp .env.example .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env

      - name: Générer la clé Laravel
        working-directory: backend
        run: php artisan key:generate

      - name: Lancer les tests avec couverture
        working-directory: backend
        run: php artisan test --coverage --min=60


  deploy:
    name: Déploiement Railway
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Railway CLI
        run: npm install -g @railway/cli

      - name: Déployer le backend
        run: railway up --service gamevibe
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Déployer le frontend
        run: railway up --service remarkable-generosity
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}