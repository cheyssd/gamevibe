services:

  database:
    image: mysql:8.0
    container_name: gamevibe_db_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gamevibe
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: gamevibe_user
      MYSQL_PASSWORD: gamevibe_pass
    volumes:
      - db_data_prod:/var/lib/mysql
    networks:
      - gamevibe_network_prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamevibe_backend_prod
    restart: unless-stopped
    environment:
      APP_NAME: GameVibe
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: gamevibe
      DB_USERNAME: gamevibe_user
      DB_PASSWORD: gamevibe_pass
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: production
      SENTRY_TRACES_SAMPLE_RATE: 0.2
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - gamevibe_network_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: gamevibe_frontend_prod
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - gamevibe_network_prod

networks:
  gamevibe_network_prod:
    driver: bridge

volumes:
  db_data_prod: