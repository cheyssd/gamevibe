server {
    listen 80;
    server_name localhost;

    # Toutes les requêtes commençant par /api/ → Laravel
    # (les en-tetes de securite sont ajoutes cote Laravel, cf. SecurityHeaders middleware,
    # pour eviter les doublons et parce que l'API peut aussi etre exposee sans Nginx devant)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Toutes les autres requêtes → React
    location / {
    # En-tetes de securite (trouves manquants par l'audit OWASP ZAP)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP relachee en dev : le serveur Vite (HMR / React Fast Refresh) injecte des
    # scripts inline et utilise eval() pour le rechargement a chaud. Le build de prod
    # (frontend/nginx.conf) n'a pas ce besoin et reste strict (script-src 'self').
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://via.placeholder.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: https://*.ingest.de.sentry.io; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
}